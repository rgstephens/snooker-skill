name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        run: echo "${{ steps.version.outputs.version }}" > VERSION

      - name: Update version in SKILL.md
        run: |
          sed -i "s/<!-- Version: .* -->/<!-- Version: ${{ steps.version.outputs.version }} -->/" SKILL.md

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION SKILL.md
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push origin main

      - name: Update ClawHub version
        env:
          CLAWHUB_API_TOKEN: ${{ secrets.CLAWHUB_API_TOKEN }}
        run: |
          zip -r skill.zip SKILL.md scripts/ -x "*.DS_Store"
          curl -fsSL -X POST \
            -H "Authorization: Bearer $CLAWHUB_API_TOKEN" \
            -F "file=@skill.zip" \
            "https://clawhub.ai/api/v1/skills"
